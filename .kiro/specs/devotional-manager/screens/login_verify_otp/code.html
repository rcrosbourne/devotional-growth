<body class="font-body text-on-surface bg-background min-h-screen flex items-center justify-center p-6 selection:bg-secondary-container">
<!-- Editorial Canvas Container -->
<main class="w-full max-w-xl mx-auto flex flex-col items-center">

<div class="mb-16">

</div>

</div>
<p class="text-on-surface-variant leading-relaxed mb-12 max-w-sm">

            </p>

<div class="flex justify-between gap-2 md:gap-4">

<input class="otp-input w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-headline border-0 border-b-2 border-outline-variant bg-surface-container-low transition-all duration-300 rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-headline border-0 border-b-2 border-outline-variant bg-surface-container-low transition-all duration-300 rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-headline border-0 border-b-2 border-outline-variant bg-surface-container-low transition-all duration-300 rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-headline border-0 border-b-2 border-outline-variant bg-surface-container-low transition-all duration-300 rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 md:w-16 md:h-20 text-center text-3xl font-headline border-0 border-b-2 border-outline-variant bg-surface-container-low transition-all duration-300 rounded-t-lg" maxlength="1" placeholder="·" type="text"/>
</div>
<!-- Action Section -->
<div class="flex flex-col items-center gap-8">
<button class="w-full bg-primary text-on-primary font-body font-medium py-4 px-8 rounded-lg hover:opacity-90 transition-opacity duration-300 flex items-center justify-center gap-2 group" type="submit">
                        Verify Code
                        <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="text-center space-y-4">
<p class="text-xs font-label text-on-surface-variant uppercase tracking-widest">
                            Didn't receive it? 
                            <a class="text-primary font-bold hover:underline underline-offset-4 decoration-secondary transition-all" href="#">Resend Code</a>
</p>
</div>
</div>
</form>
</div>
<!-- Secondary Support Text -->

<p class="text-xs text-on-surface-variant/60 leading-relaxed italic font-headline">
